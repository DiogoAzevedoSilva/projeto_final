<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas | TaskFlow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="brand">
      <img src="assets/logo-taskflow.png" alt="Logo TaskFlow" class="brand-logo">
    </div>

    <nav aria-label="Menu principal">
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="tarefas.html">Tarefas</a></li>
        <li><a href="#sobre">Sobre</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="tarefas">
      <div class="topo-tarefas">
        <div>
          <h2>Gerir tarefas</h2>
          <p>Crie, edite e acompanhe as suas tarefas.</p>
        </div>
      </div>

      <form id="formTarefa">
        <fieldset>
          <legend>Nova tarefa</legend>

          <label for="name">Nome da tarefa</label>
          <input type="text" id="name" name="name" placeholder="Ex.: Estudar JavaScript">

          <label for="description">Descrição</label>
          <textarea id="description" name="description" rows="4" placeholder="Descreva a tarefa"></textarea>

          <label for="category">Categoria</label>
          <select id="category" name="category">
            <option value="pessoal">Pessoal</option>
            <option value="profissional">Profissional</option>
            <option value="bem_estar">Bem-estar</option>
            <option value="lazer">Lazer</option>
            <option value="outro">Outro</option>
          </select>

          <label for="priority">Prioridade</label>
          <select id="priority" name="priority">
            <option value="1">Low</option>
            <option value="2">Medium</option>
            <option value="3">High</option>
          </select>


            <label for="date_start">Data início</label>
            <input type="date" id="date_start" name="date_start">

            <label for="date_finish_pred">Data fim prevista</label>
            <input type="date" id="date_finish_pred" name="date_finish_pred">

<button type="submit">Guardar tarefa</button>
          <button type="submit">Guardar tarefa</button>
        </fieldset>
      </form>

      <div class="lista-tarefas">
        <div class="tarefa-card">
          <h4>Estudar Node.js</h4>
          <p>Rever Express, rotas e ligação ao MySQL.</p>

          <div class="tarefa-meta">
            <span class="tag tag-profissional">Profissional</span>
            <span class="priority-high">High</span>
            <span class="status-iniciado">Iniciado</span>
          </div>

          <div class="tarefa-acoes">
            <button class="btn-concluir">Concluir</button>
            <button class="btn-editar">Editar</button>
            <button class="btn-apagar">Apagar</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>TaskFlow © 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
